name: Generate Web Files
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flet
      - run: flet publish
      - name: Save Files for Netlify
        uses: actions/upload-artifact@v4
        with:
          name: Mahamati-Ready-Files
          path: dist
